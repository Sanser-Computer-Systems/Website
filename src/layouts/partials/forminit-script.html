<script src="https://forminit.com/sdk/v1/forminit.js"></script>

<script>
  const FORM_ID = '{{ .Site.Params.forminitFormId }}';
  const form = document.getElementById('contact-form');
  const status = document.getElementById('form-status');

  form.addEventListener('submit', function (event) {
    event.preventDefault();

    // Visual feedback
    status.textContent = 'Sending...';
    status.className = 'status-loading';

    // Small delay prevents extension async-channel errors
    setTimeout(async () => {
      try {
        const forminit = new Forminit();
        const formData = new FormData(form);
        // TODO: Enable reCAPTCHA v3 support in Forminit SDK.
        formData.delete("g-recaptcha-response"); // Remove reCAPTCHA response if present. 

        const { data, error } = await forminit.submit(FORM_ID, formData);

        if (error) {
          status.textContent = error.message || 'Something went wrong.';
          status.className = 'status-error';
          return;
        }

        // Success
        status.textContent = 'Message sent successfully!';
        status.className = 'status-success';

        // Delay prevents extensions from breaking async listeners
        setTimeout(() => form.reset(), 50);

      } catch (err) {
        status.textContent = 'Unexpected error. Please try again.';
        status.className = 'status-error';
        console.error('Forminit error:', err);
      }
    }, 30); // 20–40ms is ideal
  });
</script>
