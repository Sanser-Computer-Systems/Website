<form id="contact-form" name="contact" class="flex flex-col gap-4">
    <div class="input">
        <input 
            type="text" 
            name="fi-sender-fullName" 
            placeholder="Name" 
            class="w-full p-4 bg-gray-200 border border-gray-200 focus:outline-none focus:bg-white focus:border-gray-500" 
            required
        \>
    </div>
    <div class="input">
        <input 
            type="text" 
            name="fi-sender-email" 
            placeholder="E-Mail" 
            class="w-full p-4 bg-gray-200 border border-gray-200 focus:outline-none focus:bg-white focus:border-gray-500" 
            required
        \>
    </div>
    <div class="input">
        <input 
            type="text" 
            name="fi-text-subject" 
            placeholder="Subject" 
            class="w-full p-4 bg-gray-200 border border-gray-200 focus:outline-none focus:bg-white focus:border-gray-500" 
            required
        \>
    </div>
    <div class="input">
        <textarea 
            name="fi-text-message" 
            placeholder="Message" 
            rows="5" 
            cols="30" 
            class="w-full p-4 bg-gray-200 border border-gray-200 focus:outline-none focus:bg-white focus:border-gray-500" 
            required>
        </textarea>
    </div>
    <input 
        type="submit" 
        value="Submit" 
        class="px-8 py-2 duration-200 bg-gray-800 text-white cursor-pointer transition-colors hover:bg-gray-400"
    \>
</form>
<p id="form-status"></p>
