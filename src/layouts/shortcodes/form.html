<form id="contact-form" name="contact" class="flex flex-col gap-6">

    <!-- Name -->
    <label class="flex flex-col gap-1">
        <span class="text-sm font-medium text-gray-600">Name</span>
        <input type="text" name="fi-sender-fullName" autocomplete="name" placeholder="Your full name" class="w-full p-4 bg-gray-50 border border-gray-300 rounded-lg 
             focus:outline-none focus:ring-2 focus:ring-gray-400 focus:bg-white" required>
    </label>

    <!-- Email -->
    <label class="flex flex-col gap-1">
        <span class="text-sm font-medium text-gray-600">Email</span>
        <input type="email" name="fi-sender-email" autocomplete="email" placeholder="you@example.com" class="w-full p-4 bg-gray-50 border border-gray-300 rounded-lg 
             focus:outline-none focus:ring-2 focus:ring-gray-400 focus:bg-white" required>
    </label>

    <!-- Subject -->
    <label class="flex flex-col gap-1">
        <span class="text-sm font-medium text-gray-600">Subject</span>
        <input type="text" name="fi-text-subject" autocomplete="organization-title"
            placeholder="What is this regarding?" class="w-full p-4 bg-gray-50 border border-gray-300 rounded-lg 
             focus:outline-none focus:ring-2 focus:ring-gray-400 focus:bg-white" required>
    </label>

    <!-- Message -->
    <label class="flex flex-col gap-1">
        <span class="text-sm font-medium text-gray-600">Message</span>
        <textarea name="fi-text-message" placeholder="How can we help?" rows="5" class="w-full p-4 bg-gray-50 border border-gray-300 rounded-lg resize-none 
             focus:outline-none focus:ring-2 focus:ring-gray-400 focus:bg-white" required></textarea>
    </label>

    <!-- Submit -->
    <button type="submit" class="px-8 py-3 bg-(--primary-colour) text-white rounded-lg font-medium
           transition-all duration-200 hover:bg-gray-700 active:scale-[0.98]">
        Submit
    </button>

</form>

<p 
  id="form-status" 
  class="hidden mt-4 p-4 rounded-lg text-sm font-medium transition-all duration-300"
  aria-live="polite"
></p>

<style>
  /* Minimal modern status styles */
  #form-status.status-loading {
    display: block;
    background: #f8fafc; /* soft neutral */
    color: #475569;      /* slate */
    border-left: 3px solid #94a3b8; /* subtle slate accent */
  }

  #form-status.status-success {
    display: block;
    background: #f0fdf4; /* soft green tint */
    color: #166534;      /* deep modern green */
    border-left: 3px solid #4ade80;
  }

  #form-status.status-error {
    display: block;
    background: #fef2f2; /* soft red tint */
    color: #b91c1c;      /* modern red */
    border-left: 3px solid #f87171;
  }
</style>
